    <text class="item" x="460" y="257" fill="#111">★ 추가 레슨</text>
    <text class="item item-small" x="460" y="297" fill="#111">★ 공연 영상 클립</text>
    <text class="item item-small" x="460" y="337" fill="#111">★ 믹스/마스터 음원</text>
    <text class="title" x="684" y="376" fill="#111" opacity=".16" transform="rotate(10 684 376)">★</text>
  </g>

  <g filter="url(#shadow)" transform="rotate(-.7 993 238)">
