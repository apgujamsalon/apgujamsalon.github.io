<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 468" role="img" aria-label="APGU JAM SALON program plans: Standard, Premium, Economy">
  <defs>
    <pattern id="paperLines" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(-7)">
      <rect width="26" height="26" fill="transparent"/>
      <path d="M0 3H26" stroke="#111" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <pattern id="darkLines" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <rect width="26" height="26" fill="transparent"/>
      <path d="M0 3H26" stroke="#fff1cf" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="9" dy="10" stdDeviation="0" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <style>
      .title { font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif; font-size: 56px; letter-spacing: 1px; }
      .price { font-family: Arial, Helvetica, sans-serif; font-size: 27px; font-weight: 900; }
      .item { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 900; }
      .item-small { font-size: 30px; }
      .caption { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 900; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="468" rx="24" fill="#050505"/>
  <circle cx="106" cy="95" r="140" fill="#ff6a19" opacity=".18"/>
  <circle cx="1068" cy="396" r="156" fill="#1c7540" opacity=".22"/>
  <circle cx="606" cy="90" r="96" fill="#fff1cf" opacity=".05"/>
  <path d="M24 400c126-34 254-38 394-3 112 28 234 22 354-11 139-39 270-28 405 18" fill="none" stroke="#fff1cf" stroke-opacity=".08" stroke-width="5"/>
  <text class="caption" x="600" y="34" fill="#fff1cf" opacity=".46" text-anchor="middle">8 WEEK BAND PROJECT PROGRAMS</text>

