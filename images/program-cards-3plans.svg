    <text class="item item-small" x="848" y="220" fill="#fff1cf">★ Venue usage only</text>
    <text class="item" x="848" y="260" fill="#fff1cf">★ 공간 이용 전용</text>
    <text class="item" x="848" y="300" fill="#fff1cf">★ No classes</text>
    <text class="item" x="848" y="340" fill="#fff1cf">★ 수업 미포함</text>
    <text class="title" x="1078" y="376" fill="#fff1cf" opacity=".13" transform="rotate(-12 1078 376)">♫</text>
