    <line x1="66" y1="176" x2="358" y2="176" stroke="#111" stroke-opacity=".22" stroke-width="4"/>
    <text class="item" x="72" y="220" fill="#111">★ 네트워킹 참여</text>
    <text class="item" x="72" y="260" fill="#111">★ 8주 밴드 프로젝트</text>
