    .desktop-brand img {

    .desktop-links {

      align-items: center;

      font-size: 15px;

    .desktop-links a {

    .desktop-hero {
      display: block;

      left: 0;

      height: min(30vw, 420px);
      overflow: visible;
      z-index: 7;
      pointer-events: none;
    }

    .desktop-hero-media {

      left: 2.6%;

      height: min(17vw, 240px);

      z-index: 2;

      border-radius: 50%;

      box-shadow: 0 0 0 4px rgba(255, 255, 255, .88);

    .desktop-hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      border-radius: 50%;
      background: #000;
      opacity: .98;
    }

    .desktop-hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, .08) 78%, rgba(0, 0, 0, .22) 100%);
      z-index: 3;
      border-radius: 50%;
    }

    .mobile-hero {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .mobile-hero-media {
      position: absolute;
      left: var(--mobile-logo-left);
      top: var(--mobile-logo-top);
      width: var(--mobile-logo-width);
      height: var(--mobile-logo-height);
      overflow: hidden;
      border-radius: 50%;
      aspect-ratio: 1 / 1;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .88);
      background: #000;
    }

    .mobile-hero-video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      border-radius: 50%;
      background: #000;
      opacity: .98;

    .mobile-hero-media::after {

      top: 5.6%;
      right: 3.5%;

      padding: 0 12px;
      border-bottom: 1px solid rgba(255, 241, 207, .16);
      color: #fff1cf;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: 21px;
      letter-spacing: .02em;
      text-decoration: none;
    }

    .menu a:last-child { border-bottom: 0; }
    .menu a:hover,
    .menu a:focus-visible { color: #ff6a19; }

    .menu-close {
      width: 100%;
      min-height: 38px;
      margin-top: 8px;
      border: 1px solid rgba(255, 241, 207, .3);
      border-radius: 4px;
      background: #f05a1c;
      color: #111;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      padding: 11px 15px;
      border-radius: 5px;
      background: #f05a1c;
      color: #111;
      font-weight: 900;
      box-shadow: 5px 6px 0 rgba(0,0,0,.4);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    <div class="video-modal-dialog">
      <button class="video-modal-close" id="videoModalClose" type="button" aria-label="Close video popup">X</button>
      <video class="video-modal-player" id="videoModalPlayer" controls autoplay muted playsinline preload="metadata">

  <div class="event-modal" id="eventModal" role="dialog" aria-modal="true" aria-label="Event details" hidden>
    <div class="event-modal-dialog">
      <button class="event-modal-close" id="eventModalClose" type="button" aria-label="Close event popup">X</button>
      <div class="event-carousel">
        <a class="event-slide-link" id="eventSlideLink" href="#" aria-label="Open event application form">
          <img id="eventSlideImage" src="images/event1.png" alt="APGU JAM SALON event" />
        </a>
        <button class="event-carousel-button event-carousel-prev" id="eventPrev" type="button" aria-label="Previous event image">‹</button>
        <button class="event-carousel-button event-carousel-next" id="eventNext" type="button" aria-label="Next event image">›</button>
      </div>
      <div class="event-dots" id="eventDots" aria-label="Event image selector"></div>
    </div>

  <script src="links.config.js"></script>
  <script>
    const links = window.AP_GU_LINKS || {};
    const menu = document.getElementById("mainMenu");
    const menuToggle = document.querySelector(".mobile-menu-ui");
    const menuClose = document.querySelector(".menu-close");
    const page = document.querySelector(".page");
    const toast = document.querySelector(".toast");
    const videoModal = document.getElementById("videoModal");
    const videoModalClose = document.getElementById("videoModalClose");
    const videoModalPlayer = document.getElementById("videoModalPlayer");
    const eventModal = document.getElementById("eventModal");
    const eventModalClose = document.getElementById("eventModalClose");
    const eventSlideLink = document.getElementById("eventSlideLink");
    const eventSlideImage = document.getElementById("eventSlideImage");
    const eventPrev = document.getElementById("eventPrev");
    const eventNext = document.getElementById("eventNext");
    const eventDots = document.getElementById("eventDots");
    const eventImages = [
      "images/event1.png",
      "images/event2.png",
      "images/event3.png"
    ];
    let eventSlideIndex = 0;
    let eventAutoplay = 0;
    const sectionOffsets = {
      home: 0,
      about: 0.22,
      program: 0.535,
      apply: 0.665,
      clip: 0.742,
      faq: 0.842,
      event: 0.842,
      members: 0.842
    };

    function isUsableUrl(url) {
      return Boolean(url && url !== "#" && !url.includes("REPLACE_THIS"));
    }

    function normalizeUrl(url) {
      if (!isUsableUrl(url)) return "";
      if (/^(https?:|mailto:|tel:)/.test(url)) return url;
      if (/^www\./.test(url)) return `https://${url}`;
      return url;
    }

    function applyOutboundLink(element, url) {
      const normalized = normalizeUrl(url);
      if (!normalized) {
        element.addEventListener("click", (event) => event.preventDefault());
        return "";
      }

      element.href = normalized;
      if (/^https?:\/\//.test(normalized)) {
        element.target = "_blank";
        element.rel = "noopener noreferrer";
      }
      return normalized;
    }

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) return parsed.pathname.slice(1);
        if (parsed.hostname.includes("youtube.com")) return parsed.searchParams.get("v");
      } catch (error) {
        return "";
      }
      return "";
    }

    document.querySelectorAll("[data-link]").forEach((element) => {
      const key = element.dataset.link;
      applyOutboundLink(element, links[key]);
    });

    document.querySelectorAll("[data-clip]").forEach((element) => {
      const clip = links.clips && links.clips[element.dataset.clip];
      const clipUrl = clip && applyOutboundLink(element, clip.url);
      if (!clipUrl) return;

      if (clip.title) element.setAttribute("aria-label", `${clip.title} clip`);
      const thumbnail = element.querySelector("img");
      const youtubeId = getYouTubeId(clipUrl);
      if (thumbnail && youtubeId) {
        thumbnail.src = `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;
      }
    });

    applyOutboundLink(eventSlideLink, links.event);

    eventImages.forEach((_, index) => {
      const dot = document.createElement("button");
      dot.className = "event-dot";
      dot.type = "button";
      dot.setAttribute("aria-label", `Show event image ${index + 1}`);
      dot.addEventListener("click", () => {
        renderEventSlide(index);
        startEventAutoplay();
      });
      eventDots.appendChild(dot);
    });

    function scrollToSection(section, behavior = "smooth") {
      const offset = sectionOffsets[section];
      if (typeof offset !== "number") return;
      const headerOffset = window.matchMedia("(min-width: 981px)").matches ? 76 : 64;
      const targetY = page.offsetTop + (page.offsetHeight * offset) - headerOffset;
      setMenu(false);
      window.scrollTo({ top: targetY, behavior });
    }

    function scrollToHashSection() {
      const section = window.location.hash.replace("#", "");
      if (!section) return;
      const poster = document.querySelector(".poster");
      const scroll = () => scrollToSection(section, "auto");

      if (poster && !poster.complete) {
        window.addEventListener("load", scroll, { once: true });
        return;
      }

      window.requestAnimationFrame(scroll);
    }

    document.querySelectorAll("[data-scroll]").forEach((element) => {
      element.addEventListener("click", (event) => {
        event.preventDefault();
        const section = element.dataset.scroll;
        scrollToSection(section);
      });
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1600);
    }

    async function copyEmail() {
      const email = links.email || "obedientcrime@gmail.com";
      try {
        await navigator.clipboard.writeText(email);
        showToast("Email copied");
      } catch (error) {
        const input = document.createElement("input");
        input.value = email;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("Email copied");
      }
    }

    document.querySelector(".email-copy").addEventListener("click", copyEmail);
    document.querySelector(".logo-home").addEventListener("click", () => {
      window.scrollTo({ top: page.offsetTop, behavior: "smooth" });
    });

    document.querySelectorAll(".poster, .hotspot").forEach((element) => {
      element.addEventListener("dragstart", (event) => event.preventDefault());
    });

    function setMenu(open) {
      menu.hidden = !open;
      menuToggle.setAttribute("aria-expanded", String(open));
      menuToggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    }

    function setVideoModal(open) {
      videoModal.hidden = !open;
      if (open) return;
      videoModalPlayer.pause();
      videoModalPlayer.currentTime = 0;
    }

    function renderEventSlide(index) {
      eventSlideIndex = (index + eventImages.length) % eventImages.length;
      eventSlideImage.src = eventImages[eventSlideIndex];
      eventSlideImage.alt = `APGU JAM SALON event ${eventSlideIndex + 1}`;

      eventDots.querySelectorAll(".event-dot").forEach((dot, dotIndex) => {
        dot.classList.toggle("is-active", dotIndex === eventSlideIndex);
        dot.setAttribute("aria-current", dotIndex === eventSlideIndex ? "true" : "false");
      });
    }

    function startEventAutoplay() {
      window.clearInterval(eventAutoplay);
      eventAutoplay = window.setInterval(() => renderEventSlide(eventSlideIndex + 1), 2600);
    }

    function setEventModal(open) {
      eventModal.hidden = !open;

      if (open) {
        renderEventSlide(0);
        startEventAutoplay();
        return;
      }

      window.clearInterval(eventAutoplay);
    }

    async function attemptVideoAutoplay() {
      videoModalPlayer.muted = true;
      try {
        await videoModalPlayer.play();
      } catch (error) {
        videoModalPlayer.controls = true;
      }
    }

    menuToggle.addEventListener("click", () => setMenu(menu.hidden));
    menuClose.addEventListener("click", () => setMenu(false));
    videoModalClose.addEventListener("click", () => setVideoModal(false));
    eventModalClose.addEventListener("click", () => setEventModal(false));
    eventPrev.addEventListener("click", () => {
      renderEventSlide(eventSlideIndex - 1);
      startEventAutoplay();
    });
    eventNext.addEventListener("click", () => {
      renderEventSlide(eventSlideIndex + 1);
      startEventAutoplay();
    });

    videoModal.addEventListener("click", (event) => {
      if (event.target === videoModal) setVideoModal(false);
    });

    eventModal.addEventListener("click", (event) => {
      if (event.target === eventModal) setEventModal(false);
    });

    menu.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", () => setMenu(false));
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setMenu(false);
      if (event.key === "Escape" && !videoModal.hidden) setVideoModal(false);
      if (event.key === "Escape" && !eventModal.hidden) setEventModal(false);
    });

    document.addEventListener("click", (event) => {
      if (menu.hidden) return;
      if (menu.contains(event.target) || menuToggle.contains(event.target)) return;
      setMenu(false);
    });

    function initializeVideoModal() {
      setEventModal(true);
      setVideoModal(true);
      attemptVideoAutoplay();
    }

    scrollToHashSection();

    if (!window.location.hash) {
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeVideoModal, { once: true });
      } else {
        initializeVideoModal();
      }
    }

    window.addEventListener("pageshow", () => {
      if (!window.location.hash && videoModal.hidden) initializeVideoModal();
    });
  </script>
</body>
