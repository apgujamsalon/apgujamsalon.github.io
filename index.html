<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APGU JAM SALON | 8 Week Band Project</title>
  <meta name="description" content="APGU JAM SALON 8주 밴드 프로젝트." />
  <link rel="icon" type="image/png" href="images/blacklogo.png" />
  <style>
    * { box-sizing: border-box; }

    html {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff1cf;
      font-family: Arial, Helvetica, sans-serif;
      width: 100%;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      position: relative;
      background: #000;
      -webkit-touch-callout: none;
    }

    .poster {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .desktop-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: linear-gradient(180deg, rgba(0,0,0,.88), rgba(0,0,0,.24));
      backdrop-filter: blur(8px);
    }

    .desktop-nav {
      width: min(1180px, calc(100% - 36px));
      min-height: 78px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .desktop-brand img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .desktop-links {
      display: flex;
      align-items: center;
      gap: 30px;
      font-weight: 900;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .desktop-links a {
      color: #fff2d2;
      text-decoration: none;
    }

    .desktop-links a:hover,
    .desktop-links a:focus-visible {
      color: #ffd37c;
    }

    .desktop-cta {
      width: 172px;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      color: transparent;
      background: url("images/signupbutton-cutout.png") center / contain no-repeat;
      font-weight: 950;
      letter-spacing: .03em;
      text-transform: uppercase;
      text-decoration: none;
      text-indent: -999px;
      overflow: hidden;
    }

    .hotspot {
      position: absolute;
      display: block;
      border: 0;
      border-radius: 6px;
      padding: 0;
      background: rgba(255, 255, 255, 0);
      color: transparent;
      overflow: hidden;
      cursor: pointer;
      appearance: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      z-index: 2;
      -webkit-tap-highlight-color: rgba(255, 106, 25, .25);
    }

    .hotspot:focus-visible {
      outline: 3px solid #ff6a19;
      outline-offset: 2px;
      background: rgba(255, 106, 25, .12);
    }

    .mobile-control-mask {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      background: #000;
      box-shadow: 0 0 18px rgba(0,0,0,.7);
    }

    .signup-mask {
      left: 61.8%;
      top: .55%;
      width: 19.4%;
      height: 3.6%;
    }

    .menu-mask {
      left: 79.2%;
      top: .55%;
      width: 9.4%;
      height: 3.6%;
    }

    .mobile-signup-ui {
      position: absolute;
      left: 64.7%;
      top: 1.12%;
      width: 13.8%;
      height: 2.8%;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: url("images/signupbutton-cutout.png") center / contain no-repeat;
      color: transparent;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: clamp(10px, 2vw, 21px);
      letter-spacing: .02em;
      text-decoration: none;
      text-transform: uppercase;
      text-indent: -999px;
      overflow: hidden;
      -webkit-tap-highlight-color: rgba(255, 106, 25, .25);
    }

    .mobile-menu-ui {
      position: absolute;
      left: 84.0%;
      top: .55%;
      width: 10.2%;
      height: 5.0%;
      z-index: 5;
      display: block;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      appearance: none;
      -webkit-tap-highlight-color: rgba(255, 106, 25, .25);
    }

    .mobile-menu-ui span,
    .mobile-menu-ui::before,
    .mobile-menu-ui::after {
      content: "";
      position: absolute;
      left: 28%;
      width: 44%;
      height: 8%;
      min-height: 2px;
      border-radius: 99px;
      background: #fff;
      box-shadow: 0 2px 0 rgba(0,0,0,.55);
    }

    .mobile-menu-ui::before { top: 31%; }
    .mobile-menu-ui span { top: 46%; }
    .mobile-menu-ui::after { top: 61%; }

    .logo-home { left: 11.0%; top: 1.2%; width: 13.0%; height: 7.3%; }
    .hero-signup { left: 12.4%; top: 17.9%; width: 25.4%; height: 3.3%; }
    .apply-link { left: 10.8%; top: 70.8%; width: 28.2%; height: 3.2%; }
    .clip-1 { left: 12.35%; top: 77.16%; width: 15.35%; height: 4.95%; }
    .clip-2 { left: 28.50%; top: 77.16%; width: 15.25%; height: 4.95%; }
    .clip-3 { left: 44.33%; top: 77.16%; width: 14.42%; height: 4.95%; }
    .clip-4 { left: 59.60%; top: 77.16%; width: 14.00%; height: 4.95%; }
    .clip-5 { left: 74.52%; top: 77.16%; width: 13.80%; height: 4.95%; }

    .clip-media {
      position: absolute;
      z-index: 4;
      display: block;
      overflow: hidden;
      border: 2px solid rgba(226, 148, 57, .86);
      border-radius: 5px;
      background: #111;
      box-shadow: 0 5px 0 rgba(0,0,0,.4);
      -webkit-tap-highlight-color: rgba(255, 106, 25, .25);
    }

    .clip-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(.78) saturate(.95);
      user-select: none;
      -webkit-user-drag: none;
    }

    .clip-media::after {
      content: "▶";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(38%, 48px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      padding-left: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      color: #111;
      font-size: clamp(10px, 2vw, 18px);
      box-shadow: 0 2px 8px rgba(0,0,0,.38);
    }

    .clip-media:focus-visible {
      outline: 3px solid #ff6a19;
      outline-offset: 2px;
    }

    .kakao-link { left: 11.2%; top: 88.3%; width: 22.3%; height: 3.3%; }
    .event-link { left: 34.2%; top: 84.1%; width: 33.6%; height: 9.9%; }
    .members-link { left: 68.8%; top: 83.7%; width: 29.8%; height: 10.7%; }
    .email-copy { left: 31.2%; top: 96.15%; width: 36.0%; height: 1.6%; }
    .instagram-link { left: 20.95%; top: 96.78%; width: 2.85%; height: 1.65%; }
    .youtube-link { left: 25.75%; top: 96.78%; width: 3.25%; height: 1.65%; }
    .spotify-link { left: 31.00%; top: 96.78%; width: 3.05%; height: 1.65%; }

    .email-patch {
      position: absolute;
      left: 31.2%;
      top: 96.11%;
      width: 36.0%;
      height: 1.5%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070707;
      color: rgba(255, 241, 207, .86);
      font-size: clamp(6px, 1.18vw, 14px);
      font-weight: 700;
      line-height: 1;
      pointer-events: none;
      white-space: nowrap;
    }

    .copyright-patch {
      position: absolute;
      left: 63.2%;
      top: 94.35%;
      width: 26.4%;
      height: 3.3%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070707;
      color: rgba(255, 241, 207, .86);
      font-size: clamp(6px, 1.15vw, 13px);
      line-height: 1.38;
      text-align: left;
      letter-spacing: .01em;
      pointer-events: none;
    }

    @media (max-width: 620px) {
      .email-patch {
        font-size: clamp(5px, 1.5vw, 8px);
        font-weight: 700;
      }

      .copyright-patch {
        font-size: clamp(5px, 1.35vw, 8px);
      }
    }

    .menu {
      position: absolute;
      top: 5.6%;
      right: 3.5%;
      width: min(285px, 74vw);
      padding: 12px;
      border: 1px solid rgba(255, 241, 207, .34);
      border-radius: 7px;
      background: rgba(6, 6, 5, .96);
      box-shadow: 8px 9px 0 rgba(0,0,0,.55);
      z-index: 5;
    }

    .menu[hidden] { display: none; }

    .menu a {
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255, 241, 207, .16);
      color: #fff1cf;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: 21px;
      letter-spacing: .02em;
      text-decoration: none;
    }

    .menu a:last-child { border-bottom: 0; }
    .menu a:hover,
    .menu a:focus-visible { color: #ff6a19; }

    .menu-close {
      width: 100%;
      min-height: 38px;
      margin-top: 8px;
      border: 1px solid rgba(255, 241, 207, .3);
      border-radius: 4px;
      background: #f05a1c;
      color: #111;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      padding: 11px 15px;
      border-radius: 5px;
      background: #f05a1c;
      color: #111;
      font-weight: 900;
      box-shadow: 5px 6px 0 rgba(0,0,0,.4);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 981px) {
      .desktop-header { display: block; }
      .page { margin-top: 78px; }
      .mobile-signup-ui,
      .mobile-menu-ui { display: none; }
    }

    @media (max-width: 980px) {
      .mobile-signup-ui {
        position: fixed;
        left: auto;
        right: 74px;
        top: 12px;
        width: 118px;
        height: 40px;
        z-index: 60;
      }

      .mobile-menu-ui {
        position: fixed;
        left: auto;
        right: 14px;
        top: 10px;
        width: 52px;
        height: 44px;
        z-index: 60;
      }

      .mobile-menu-ui span,
      .mobile-menu-ui::before,
      .mobile-menu-ui::after {
        left: 22%;
        width: 56%;
        height: 5px;
      }

      .mobile-menu-ui::before { top: 28%; }
      .mobile-menu-ui span { top: 46%; }
      .mobile-menu-ui::after { top: 64%; }

      .menu {
        position: fixed;
        top: 62px;
        right: 12px;
        width: min(285px, calc(100vw - 24px));
        z-index: 59;
      }
    }
  </style>
</head>
<body>
  <header class="desktop-header">
    <div class="desktop-nav">
      <a class="desktop-brand" href="#" data-scroll="home" aria-label="APGU JAM SALON Home">
        <img src="images/whitelogo.png" alt="APGU JAM SALON logo" />
      </a>

      <nav class="desktop-links" aria-label="Desktop navigation">
        <a href="#" data-scroll="about">ABOUT</a>
        <a href="#" data-scroll="program">PROGRAM</a>
        <a href="#" data-scroll="apply">APPLY</a>
        <a href="#" data-scroll="clip">CLIP</a>
        <a href="#" data-scroll="faq">FAQ</a>
        <a href="#" data-scroll="event">EVENT</a>
        <a href="#" data-scroll="members">MEMBERS ONLY</a>
      </nav>

      <a class="desktop-cta" href="#" data-link="signup">SIGN UP</a>
    </div>
  </header>

  <main class="page" aria-label="APGU JAM SALON mobile web page">
    <img class="poster" src="images/mobileweb.png" alt="APGU JAM SALON 8 week band project poster" draggable="false" />

    <button class="hotspot logo-home" type="button" aria-label="Back to top"></button>
    <div class="mobile-control-mask signup-mask" aria-hidden="true"></div>
    <div class="mobile-control-mask menu-mask" aria-hidden="true"></div>
    <a class="mobile-signup-ui" href="#" data-link="signup" aria-label="Sign up">SIGN UP</a>
    <button class="mobile-menu-ui" type="button" aria-label="Open menu" aria-controls="mainMenu" aria-expanded="false"><span></span></button>

    <a class="hotspot hero-signup" href="#" data-link="signup" aria-label="Sign up now"></a>
    <a class="hotspot apply-link" href="#" data-link="apply" aria-label="Apply with Google Form"></a>

    <a class="clip-media clip-1" href="#" data-clip="1" aria-label="공연 실황 / Live Performance"><img alt="" /></a>
    <a class="clip-media clip-2" href="#" data-clip="2" aria-label="합주 스케치 / Rehearsal Sketch"><img alt="" /></a>
    <a class="clip-media clip-3" href="#" data-clip="3" aria-label="게더링 파티 / Gathering Party"><img alt="" /></a>
    <a class="clip-media clip-4" href="#" data-clip="4" aria-label="클리닉 현장 / Clinic Session"><img alt="" /></a>
    <a class="clip-media clip-5" href="#" data-clip="5" aria-label="멤버 인터뷰 / Member Interview"><img alt="" /></a>

    <a class="hotspot kakao-link" href="#" data-link="kakao" aria-label="카카오톡 문의하기"></a>
    <a class="hotspot event-link" href="#" data-link="event" aria-label="Event details"></a>
    <a class="hotspot members-link" href="#" data-link="members" aria-label="Members only page"></a>
    <a class="hotspot instagram-link" href="#" data-link="instagram" aria-label="Instagram"></a>
    <a class="hotspot youtube-link" href="#" data-link="youtube" aria-label="YouTube"></a>
    <a class="hotspot spotify-link" href="#" data-link="spotify" aria-label="Spotify"></a>
    <button class="hotspot email-copy" type="button" aria-label="Copy email address"></button>

    <div class="email-patch" aria-hidden="true">문의 : apgujamsalon@gmail.com</div>

    <div class="copyright-patch" aria-hidden="true">
      © 2026 APGU JAM SALON.<br />
      ALL RIGHTS RESERVED.
    </div>

    <nav class="menu" id="mainMenu" aria-label="Main menu" hidden>
      <a href="#" data-link="signup">SIGN UP</a>
      <a href="#" data-scroll="about">ABOUT</a>
      <a href="#" data-scroll="program">PROGRAM</a>
      <a href="#" data-scroll="apply">APPLY</a>
      <a href="#" data-scroll="clip">CLIP</a>
      <a href="#" data-scroll="faq">FAQ</a>
      <a href="#" data-scroll="event">EVENT</a>
      <a href="#" data-scroll="members">MEMBERS ONLY</a>
      <button class="menu-close" type="button">CLOSE</button>
    </nav>
  </main>

  <div class="toast" role="status" aria-live="polite">Email copied</div>

  <script src="links.config.js"></script>
  <script>
    const links = window.AP_GU_LINKS || {};
    const menu = document.getElementById("mainMenu");
    const menuToggle = document.querySelector(".mobile-menu-ui");
    const menuClose = document.querySelector(".menu-close");
    const page = document.querySelector(".page");
    const toast = document.querySelector(".toast");
    const sectionOffsets = {
      home: 0,
      about: 0.22,
      program: 0.535,
      apply: 0.665,
      clip: 0.742,
      faq: 0.842,
      event: 0.842,
      members: 0.842
    };

    function isUsableUrl(url) {
      return Boolean(url && url !== "#" && !url.includes("REPLACE_THIS"));
    }

    function normalizeUrl(url) {
      if (!isUsableUrl(url)) return "";
      if (/^(https?:|mailto:|tel:)/.test(url)) return url;
      if (/^www\./.test(url)) return `https://${url}`;
      return url;
    }

    function applyOutboundLink(element, url) {
      const normalized = normalizeUrl(url);
      if (!normalized) {
        element.addEventListener("click", (event) => event.preventDefault());
        return "";
      }

      element.href = normalized;
      if (/^https?:\/\//.test(normalized)) {
        element.target = "_blank";
        element.rel = "noopener noreferrer";
      }
      return normalized;
    }

    function getYouTubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) return parsed.pathname.slice(1);
        if (parsed.hostname.includes("youtube.com")) return parsed.searchParams.get("v");
      } catch (error) {
        return "";
      }
      return "";
    }

    document.querySelectorAll("[data-link]").forEach((element) => {
      const key = element.dataset.link;
      applyOutboundLink(element, links[key]);
    });

    document.querySelectorAll("[data-clip]").forEach((element) => {
      const clip = links.clips && links.clips[element.dataset.clip];
      const clipUrl = clip && applyOutboundLink(element, clip.url);
      if (!clipUrl) return;

      if (clip.title) element.setAttribute("aria-label", `${clip.title} clip`);
      const thumbnail = element.querySelector("img");
      const youtubeId = getYouTubeId(clipUrl);
      if (thumbnail && youtubeId) {
        thumbnail.src = `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;
      }
    });

    document.querySelectorAll("[data-scroll]").forEach((element) => {
      element.addEventListener("click", (event) => {
        event.preventDefault();
        const offset = sectionOffsets[element.dataset.scroll];
        if (typeof offset !== "number") return;
        const headerOffset = window.matchMedia("(min-width: 981px)").matches ? 76 : 64;
        const targetY = page.offsetTop + (page.offsetHeight * offset) - headerOffset;
        setMenu(false);
        window.scrollTo({ top: targetY, behavior: "smooth" });
      });
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1600);
    }

    async function copyEmail() {
      const email = links.email || "apgujamsalon@gmail.com";
      try {
        await navigator.clipboard.writeText(email);
        showToast("Email copied");
      } catch (error) {
        const input = document.createElement("input");
        input.value = email;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("Email copied");
      }
    }

    document.querySelector(".email-copy").addEventListener("click", copyEmail);
    document.querySelector(".logo-home").addEventListener("click", () => {
      window.scrollTo({ top: page.offsetTop, behavior: "smooth" });
    });

    document.querySelectorAll(".poster, .hotspot").forEach((element) => {
      element.addEventListener("dragstart", (event) => event.preventDefault());
    });

    function setMenu(open) {
      menu.hidden = !open;
      menuToggle.setAttribute("aria-expanded", String(open));
      menuToggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    }

    menuToggle.addEventListener("click", () => setMenu(menu.hidden));
    menuClose.addEventListener("click", () => setMenu(false));

    menu.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", () => setMenu(false));
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setMenu(false);
    });

    document.addEventListener("click", (event) => {
      if (menu.hidden) return;
      if (menu.contains(event.target) || menuToggle.contains(event.target)) return;
      setMenu(false);
    });
  </script>
</body>
</html>
