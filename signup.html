<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APGU JAM SALON | Sign Up</title>
  <meta name="description" content="APGU JAM SALON sign up page is under construction." />
  <link rel="icon" type="image/png" href="images/blacklogo.png" />
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 72% 22%, rgba(240, 90, 28, .28), transparent 28%),
        radial-gradient(circle at 18% 72%, rgba(36, 168, 90, .18), transparent 26%),
        #050505;
      color: #fff1cf;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .panel {
      width: min(100%, 560px);
      padding: 38px 28px 34px;
      border: 1px solid rgba(255, 241, 207, .24);
      border-radius: 8px;
      background: rgba(10, 10, 9, .88);
      box-shadow: 10px 12px 0 rgba(0, 0, 0, .42);
    }

    .logo {
      width: 132px;
      margin: 0 auto 26px;
      filter: drop-shadow(0 5px 0 rgba(0,0,0,.45));
    }

    h1 {
      margin: 0 0 14px;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: clamp(42px, 10vw, 70px);
      line-height: .9;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: rgba(255, 241, 207, .86);
      font-size: 17px;
      line-height: 1.7;
      font-weight: 800;
    }

    .email {
      display: inline-block;
      margin-top: 18px;
      color: #ff6a19;
      font-weight: 950;
      text-decoration: none;
    }

    .back {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 0 18px;
      border-radius: 5px;
      background: #f05a1c;
      color: #111;
      font-weight: 950;
      text-decoration: none;
      box-shadow: 4px 5px 0 rgba(0,0,0,.45);
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .panel {
        padding: 26px 18px 24px;
        box-shadow: 6px 7px 0 rgba(0, 0, 0, .42);
      }

      .logo {
        width: 94px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(32px, 14vw, 48px);
        line-height: .92;
        margin-bottom: 12px;
      }

      p {
        font-size: 14px;
        line-height: 1.55;
      }

      .email {
        max-width: 100%;
        overflow-wrap: anywhere;
        margin-top: 12px;
        font-size: 14px;
      }

      .back {
        width: 100%;
        margin-top: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <img class="logo" src="images/whitelogo.png" alt="APGU JAM SALON" />
    <h1>Under Construction</h1>
    <p>
      This page is under construction.<br />
      We will be back soon.
    </p>
    <p>
      For inquiries, message us at<br />
      <a class="email" href="mailto:apgujamsalon@gmail.com">apgujamsalon@gmail.com</a>
    </p>
    <a class="back" href="newindex.html">Back to home</a>
  </main>
</body>
</html>
